name: Init Wiki
on:
  workflow_dispatch:

jobs:
  create-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: CS-Faith/reasonix-portakit.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create pages
        working-directory: wiki
        run: python3 $GITHUB_WORKSPACE/.github/scripts/create_wiki_pages.py
      - name: Push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Init wiki pages" && git push; fi
